name: Build and Release Flip Clock

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Restore packages
        run: nuget restore clock_scr.sln

      - name: Build solution
        run: msbuild clock_scr.sln /p:Configuration=Release /p:Platform="Any CPU"

      - name: Publish project
        run: msbuild .\clock_scr\clock_scr.csproj /t:Publish /p:Configuration=Release /p:PublishDir="${{ github.workspace }}\publish\\"

      - name: Show publish files
        shell: pwsh
        run: |
          Write-Host "=== publish directory ==="
          Get-ChildItem -Path .\publish -Recurse | Select-Object FullName

      - name: Rename exe to Flip_Clock.scr
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path .\publish -Filter Flip_Clock.exe -Recurse | Select-Object -First 1
          if (-not $exe) {
            throw "Flip_Clock.exe が見つかりませんでした"
          }

          $scrPath = Join-Path $exe.DirectoryName "Flip_Clock.scr"
          Rename-Item -Path $exe.FullName -NewName "Flip_Clock.scr"

          if (-not (Test-Path $scrPath)) {
            throw "Flip_Clock.scr へのリネームに失敗しました"
          }

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release_package | Out-Null
          New-Item -ItemType Directory -Force -Path release_package\source | Out-Null

          $scr = Get-ChildItem -Path .\publish -Filter Flip_Clock.scr -Recurse | Select-Object -First 1
          if (-not $scr) {
            throw "Flip_Clock.scr が見つかりませんでした"
          }

          Copy-Item -Path $scr.FullName -Destination .\release_package\Flip_Clock.scr -Force

          if (Test-Path .\LICENSE) {
            Copy-Item -Path .\LICENSE -Destination .\release_package\LICENSE -Force
          }

          if (Test-Path .\README.md) {
            Copy-Item -Path .\README.md -Destination .\release_package\README.md -Force
          }

          robocopy . .\release_package\source /E /XD .git .github .vs bin obj publish release_package
          if ($LASTEXITCODE -gt 7) {
            throw "ソースコードのコピーに失敗しました (robocopy exit code: $LASTEXITCODE)"
          }

          exit 0

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path .\release_package\* -DestinationPath .\Flip_Clock.zip -Force

      - name: Create tag
        id: tagger
        shell: pwsh
        run: |
          $tag = "build-" + (Get-Date -Format "yyyyMMdd-HHmmss")
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tagger.outputs.tag }}
          name: ${{ steps.tagger.outputs.tag }}
          files: |
            Flip_Clock.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
